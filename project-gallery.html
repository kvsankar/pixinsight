<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PixInsight Project Gallery</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f2;
      --ink: #18201c;
      --muted: #68726c;
      --line: #cbd3cc;
      --panel: #ffffff;
      --panel-2: #edf3f2;
      --accent: #2d7a78;
      --accent-2: #a75532;
      --good: #26704f;
      --warn: #9a6517;
      --bad: #a83c33;
      --info: #4f6288;
      --shadow: 0 14px 36px rgba(20, 26, 23, 0.13);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    .app-shell {
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .header-inner {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 28px 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.85rem, 2.6vw, 3rem);
      line-height: 1.05;
      font-weight: 760;
    }

    .lede {
      max-width: 880px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .site-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .site-links a {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid rgba(45, 122, 120, 0.28);
      border-radius: 999px;
      padding: 7px 10px;
      background: #ffffff;
      white-space: nowrap;
    }

    .site-links a:hover,
    .site-links a:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .project-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 18px 0 2px;
    }

    .project-pill {
      border: 1px solid var(--line);
      background: #f8faf8;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 13px;
      white-space: nowrap;
      cursor: pointer;
    }

    .project-pill[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 28px 48px;
    }

    .project-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
      margin-bottom: 22px;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.45rem, 2vw, 2.2rem);
      line-height: 1.1;
    }

    .project-status {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 880px;
      line-height: 1.5;
    }

    .doc-links {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: flex-end;
      max-width: 520px;
    }

    .doc-links a {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid rgba(45, 122, 120, 0.28);
      border-radius: 999px;
      padding: 7px 10px;
      background: #ffffff;
      white-space: nowrap;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 24px;
      align-items: start;
    }

    .tree-wrap,
    .side-wrap {
      min-width: 0;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 0.84rem;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 730;
    }

    .tree {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .tree ul {
      list-style: none;
      margin: 0 0 0 22px;
      padding: 0 0 0 22px;
      border-left: 2px solid var(--line);
    }

    .tree-node {
      margin: 0 0 18px;
      position: relative;
    }

    .edge-label {
      display: inline-block;
      margin: 8px 0 10px -12px;
      padding: 5px 9px;
      background: #eef2ef;
      color: #45524b;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 0.78rem;
      line-height: 1.2;
    }

    .node-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .node-main {
      padding: 14px 15px 12px;
      display: grid;
      gap: 8px;
    }

    .node-title-row {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .node-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
      font-weight: 720;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 4px 8px;
      color: white;
      font-size: 0.72rem;
      line-height: 1;
      font-weight: 730;
      text-transform: uppercase;
    }

    .badge.accepted { background: var(--good); }
    .badge.review { background: var(--accent); }
    .badge.diagnostic { background: var(--info); }
    .badge.reference { background: #5e625d; }
    .badge.rejected { background: var(--bad); }
    .badge.paused { background: var(--warn); }

    .node-note {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.94rem;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 9px;
      padding: 0 15px 15px;
    }

    .thumb {
      width: 100%;
      border: 1px solid #d9dfda;
      background: #111;
      color: white;
      border-radius: 6px;
      padding: 0;
      overflow: hidden;
      cursor: zoom-in;
      text-align: left;
      min-height: 132px;
      display: grid;
      grid-template-rows: 94px minmax(38px, auto);
    }

    .thumb img {
      width: 100%;
      height: 94px;
      object-fit: cover;
      display: block;
      background: #1b1b1b;
    }

    .thumb span {
      display: block;
      padding: 7px 8px 8px;
      font-size: 0.78rem;
      line-height: 1.25;
      background: #1c211e;
    }

    .side-wrap {
      position: sticky;
      top: 16px;
    }

    .side-panel {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .stats {
      display: grid;
      gap: 9px;
    }

    .stat {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      font-size: 0.91rem;
      line-height: 1.38;
    }

    .stat strong {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .all-images {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .mini-thumb {
      border: 0;
      background: #121513;
      border-radius: 6px;
      overflow: hidden;
      padding: 0;
      cursor: zoom-in;
      aspect-ratio: 1.28 / 1;
    }

    .mini-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 9, 0.92);
      display: none;
      z-index: 100;
      color: white;
      overflow: hidden;
    }

    .lightbox.open {
      display: grid;
      height: 100dvh;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .lightbox-top,
    .lightbox-bottom {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.35);
    }

    .lightbox-title {
      min-width: 0;
    }

    .lightbox-title strong,
    .lightbox-title span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lightbox-title span {
      color: #cbd2cc;
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .lightbox-stage {
      position: relative;
      min-height: 0;
      min-width: 0;
      display: grid;
      place-items: center;
      padding: 10px 74px;
      overflow: hidden;
    }

    .lightbox-stage img {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      object-fit: contain;
      display: block;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
      background: #050505;
    }

    .lightbox-button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(12, 15, 14, 0.58);
      color: white;
      border-radius: 999px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      padding: 0;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(12px);
      transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
    }

    .lightbox-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .lightbox-button:hover,
    .lightbox-button:focus-visible {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.42);
      transform: translateY(-1px);
      outline: none;
    }

    .project-pill:hover,
    .thumb:hover,
    .mini-thumb:hover,
    .doc-links a:hover {
      filter: brightness(1.04);
    }

    .nav-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 64px;
      border-radius: 999px;
      background: rgba(12, 15, 14, 0.48);
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      transform: translateY(calc(-50% - 1px));
    }

    .nav-button svg {
      width: 30px;
      height: 30px;
      stroke-width: 2.15;
    }

    .close-button {
      flex: 0 0 auto;
    }

    .nav-button.prev { left: 18px; }
    .nav-button.next { right: 18px; }

    .lightbox-bottom {
      color: #dce1dc;
      font-size: 0.92rem;
      line-height: 1.4;
    }

    @media (max-width: 980px) {
      .project-header,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .doc-links {
        justify-content: flex-start;
      }

      .side-wrap {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .header-inner,
      main {
        padding-left: 16px;
        padding-right: 16px;
      }

      .tree ul {
        margin-left: 10px;
        padding-left: 14px;
      }

      .thumb-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }

      .lightbox-stage {
        padding: 8px 12px 72px;
      }

      .nav-button {
        top: auto;
        bottom: 14px;
        transform: none;
      }

      .nav-button:hover,
      .nav-button:focus-visible {
        transform: translateY(-1px);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="header-inner">
        <h1>PixInsight Project Gallery</h1>
        <p class="lede">A static review surface for the astrophotography projects in this repository: processing branches, decision points, comparison images, and final or candidate JPEGs.</p>
        <nav class="site-links" aria-label="Repository pages">
          <a href="index.html">Image Picks</a>
          <a href="intent.html">Project Intent</a>
          <a href="readme.md">Project README</a>
        </nav>
        <nav id="projectPills" class="project-pills" aria-label="Projects"></nav>
      </div>
    </header>

    <main>
      <section class="project-header" aria-live="polite">
        <div>
          <h2 id="projectTitle"></h2>
          <p id="projectStatus" class="project-status"></p>
        </div>
        <div id="docLinks" class="doc-links"></div>
      </section>

      <div class="content-grid">
        <section class="tree-wrap">
          <h3 class="section-title">Process Tree</h3>
          <ul id="processTree" class="tree"></ul>
        </section>
        <aside class="side-wrap">
          <div class="side-panel">
            <h3 class="section-title">Project Snapshot</h3>
            <div id="projectStats" class="stats"></div>
            <h3 class="section-title" style="margin-top:18px;">Images</h3>
            <div id="allImages" class="all-images"></div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="lightbox-top">
      <div class="lightbox-title">
        <strong id="lightboxProject"></strong>
        <span id="lightboxTitle"></span>
      </div>
      <button id="lightboxClose" class="lightbox-button close-button" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <div class="lightbox-stage">
      <button id="lightboxPrev" class="lightbox-button nav-button prev" type="button" aria-label="Previous image">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>
      <img id="lightboxImage" alt="">
      <button id="lightboxNext" class="lightbox-button nav-button next" type="button" aria-label="Next image">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="m9 18 6-6-6-6"></path>
        </svg>
      </button>
    </div>
    <div class="lightbox-bottom">
      <span id="lightboxNote"></span>
      <span id="lightboxCounter"></span>
    </div>
  </div>

  <script>
    const projects = [
      {
        id: "m42",
        title: "Orion Nebula / M42 2013",
        status: "BXT/NXT v3 is the current cleaner replacement candidate. The earlier v8 remains the historically accepted final v1.",
        stats: {
          target: "M42, M43, Running Man",
          data: "31 x 180s base, 20 x 300s faint support",
          outcome: "BXT/NXT v3 pending final review"
        },
        docs: [
          ["Status", "projects/orion-nebula-m42-2013/docs/status.md"],
          ["Pipeline", "projects/orion-nebula-m42-2013/docs/pipeline.md"],
          ["Journey", "projects/orion-nebula-m42-2013/docs/processing-journey.md"],
          ["Final v1", "projects/orion-nebula-m42-2013/docs/final-v1.md"]
        ],
        roots: ["source"],
        nodes: [
          {
            id: "source",
            title: "February 2013 M42 acquisition",
            status: "reference",
            note: "Published notes identify a Canon EOS 60D with the 70-200 mm lens at 200 mm f/3.5. Exposure groups were kept separate before integration.",
            images: [
              img("2013 finished-work reference", "projects/orion-nebula-m42-2013/docs/images/original-2013-finished-work.jpg", "Historical processing reference.")
            ]
          },
          {
            id: "m42-flat-control",
            title: "Flat-calibrated 180s control",
            status: "rejected",
            note: "The historical six-flat branch completed WBPP and Phase 2, but equal-treatment previews subtracted too much outer M42/M43 structure. It stayed as evidence, not the baseline.",
            images: []
          },
          {
            id: "phase2",
            title: "180s no-flats linear baseline",
            status: "accepted",
            note: "The 180s no-flats branch preserved more outer M42/M43 structure than the flat-calibrated branch after identical Phase 2 processing.",
            images: [
              img("180s no-flats WBPP", "projects/orion-nebula-m42-2013/docs/images/m42-180s-noflats-wbpp-linked-stf.jpg", "Integrated 180s control before nonlinear work."),
              img("180s no-flats field", "projects/orion-nebula-m42-2013/docs/images/m42-180s-noflats-phase2-field-linked-stf.jpg", "Solved/SPCC field preview."),
              img("180s no-flats core", "projects/orion-nebula-m42-2013/docs/images/m42-180s-noflats-phase2-core-linked-stf.jpg", "Core preview for HDR/saturation review."),
              img("180s flat WBPP control", "projects/orion-nebula-m42-2013/docs/images/m42-180s-wbpp-linked-stf.jpg", "Flat-calibrated control integration."),
              img("180s flat field control", "projects/orion-nebula-m42-2013/docs/images/m42-180s-flat-phase2-field-linked-stf.jpg", "Flat-calibrated solved field preview."),
              img("180s flat core control", "projects/orion-nebula-m42-2013/docs/images/m42-180s-flat-phase2-core-linked-stf.jpg", "Flat-calibrated core preview.")
            ]
          },
          {
            id: "m42-core-hdr",
            title: "Core/HDR reality check",
            status: "diagnostic",
            note: "Raw-frame checks confirmed clipped core pixels, and the sparse 60s stack was too weak for a confident Trapezium replacement. The honest path became dynamic-range compression rather than true HDR recovery.",
            images: []
          },
          {
            id: "stock-v8",
            title: "Stock final v1: v8 with 300s support",
            status: "accepted",
            note: "Accepted before the RC Astro trial. Uses 180s core blend plus conservative registered 300s faint-nebulosity support.",
            images: [
              img("v1 180s no-flats", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v1-180s-noflats.jpg", "First nonlinear 180s branch."),
              img("v2 180s no-flats", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v2-180s-noflats.jpg", "Second nonlinear iteration."),
              img("v3 180s no-flats", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v3-180s-noflats.jpg", "Third nonlinear iteration."),
              img("v4 180s no-flats", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v4-180s-noflats.jpg", "Fourth nonlinear iteration."),
              img("v5 180s no-flats", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v5-180s-noflats.jpg", "Fifth nonlinear iteration."),
              img("v6 core blend", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v6-coreblend.jpg", "Earlier core-blend attempt."),
              img("v7 rich", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v7-rich.jpg", "Pre-v8 rich branch."),
              img("v7 quiet core", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v7-corequiet.jpg", "Pre-v8 quiet core layer."),
              img("v7 core blend", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v7-coreblend.jpg", "Pre-v8 core-blend result."),
              img("v7 presentation", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v7-presentation.jpg", "Pre-v8 presentation candidate."),
              img("v8 rich", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-rich.jpg", "Richer 180s nonlinear branch."),
              img("v8 quiet core", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-corequiet.jpg", "Quiet core layer used by v8."),
              img("v8 core blend", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-coreblend.jpg", "Quiet core blended into the richer field."),
              img("v8 support blend", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-300s-supportblend.jpg", "300s support blended into the stock branch."),
              img("v8 presentation", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-presentation.jpg", "Accepted final v1."),
              img("Original / v3 / v5 comparison", "projects/orion-nebula-m42-2013/docs/images/m42-2013-original-v3-v5-comparison.jpg", "Early nonlinear comparison panel."),
              img("Original / v3 / v6 comparison", "projects/orion-nebula-m42-2013/docs/images/m42-2013-original-v3-v6-comparison.jpg", "Midstream nonlinear comparison panel."),
              img("Original / v6 / v7 comparison", "projects/orion-nebula-m42-2013/docs/images/m42-2013-original-v6-v7-presentation-comparison.jpg", "Pre-v8 presentation comparison."),
              img("Original / v7 / v8 comparison", "projects/orion-nebula-m42-2013/docs/images/m42-2013-original-v7-v8-presentation-comparison.jpg", "Historical comparison panel.")
            ]
          },
          {
            id: "bxt-v1",
            title: "BXT/NXT v1: 180s plugin branch",
            status: "review",
            note: "Starts before old MLT denoise. Review found it better than the pre-plugin cut: clearer structure and more open faint nebulosity.",
            images: [
              img("BXT/NXT linear preview", "projects/orion-nebula-m42-2013/docs/images/m42-2013-bxt-nxt-linear-linked-stf.jpg", "Linear linked-STF after BXT, NXT, and light SCNR."),
              img("BXT/NXT v1 rich", "projects/orion-nebula-m42-2013/docs/images/m42-2013-bxt-nxt-v1-rich.jpg", "Rich 180s plugin branch."),
              img("BXT/NXT v1 quiet core", "projects/orion-nebula-m42-2013/docs/images/m42-2013-bxt-nxt-v1-corequiet.jpg", "Quiet-core plugin layer."),
              img("BXT/NXT v1 core blend", "projects/orion-nebula-m42-2013/docs/images/m42-2013-bxt-nxt-v1-coreblend.jpg", "Plugin branch with quiet-core blend."),
              img("BXT/NXT v1 presentation", "projects/orion-nebula-m42-2013/docs/images/m42-2013-bxt-nxt-v1-presentation.jpg", "First plugin presentation candidate."),
              img("v8 vs BXT/NXT v1", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-vs-bxt-nxt-v1-comparison.jpg", "Full-frame comparison."),
              img("v8 vs BXT/NXT v1 core crop", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-vs-bxt-nxt-v1-core-crop.jpg", "Core comparison crop."),
              img("v8 vs BXT/NXT v1 sky crop", "projects/orion-nebula-m42-2013/docs/images/m42-2013-v8-vs-bxt-nxt-v1-sky-crop.jpg", "Sky texture comparison crop.")
            ]
          },
          {
            id: "bxt-v2",
            title: "BXT/NXT v2: plugin 300s support",
            status: "review",

    function img(label, src, note) {
      return { label, src, note: note || "" };
    }

    function edge(from, to, label) {
      return { from, to, label };
    }

    const state = {
      projectIndex: 0,
      images: [],
      lightboxIndex: 0
    };

    const els = {
      pills: document.getElementById("projectPills"),
      title: document.getElementById("projectTitle"),
      status: document.getElementById("projectStatus"),
      docs: document.getElementById("docLinks"),
      stats: document.getElementById("projectStats"),
      tree: document.getElementById("processTree"),
      allImages: document.getElementById("allImages"),
      lightbox: document.getElementById("lightbox"),
      lightboxImage: document.getElementById("lightboxImage"),
      lightboxProject: document.getElementById("lightboxProject"),
      lightboxTitle: document.getElementById("lightboxTitle"),
      lightboxNote: document.getElementById("lightboxNote"),
      lightboxCounter: document.getElementById("lightboxCounter"),
      close: document.getElementById("lightboxClose"),
      prev: document.getElementById("lightboxPrev"),
      next: document.getElementById("lightboxNext")
    };

    function esc(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function flattenImages(project) {
      const output = [];
      const seen = new Set();
      for (const node of project.nodes) {
        for (const image of node.images || []) {
          if (seen.has(image.src)) continue;
          seen.add(image.src);
          output.push({ ...image, node: node.title });
        }
      }
      return output;
    }

    function renderPills() {
      els.pills.innerHTML = projects.map((project, index) => `
        <button class="project-pill" type="button" aria-selected="${index === state.projectIndex}" data-project-index="${index}">
          ${esc(project.title)}
        </button>
      `).join("");
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (["accepted", "review", "diagnostic", "reference", "rejected", "paused"].includes(s)) return s;
      return "diagnostic";
    }

    function renderDocs(project) {
      els.docs.innerHTML = project.docs.map(([label, href]) => `
        <a href="${esc(href)}">${esc(label)}</a>
      `).join("");
    }

    function renderStats(project) {
      els.stats.innerHTML = Object.entries(project.stats || {}).map(([key, value]) => `
        <div class="stat"><strong>${esc(key)}</strong><span>${esc(value)}</span></div>
      `).join("");
    }

    function imageIndexFor(src) {
      return state.images.findIndex(image => image.src === src);
    }

    function renderThumb(image) {
      const index = imageIndexFor(image.src);
      return `
        <button class="thumb" type="button" data-image-index="${index}" aria-label="Open ${esc(image.label)}">
          <img src="${esc(image.src)}" alt="${esc(image.label)}" loading="lazy">
          <span>${esc(image.label)}</span>
        </button>
      `;
    }

    function renderTree(project) {
      const nodes = new Map(project.nodes.map(node => [node.id, node]));
      const children = new Map();
      for (const node of project.nodes) children.set(node.id, []);
      for (const item of project.edges) {
        if (!children.has(item.from)) children.set(item.from, []);
        children.get(item.from).push(item);
      }

      function nodeHtml(id) {
        const node = nodes.get(id);
        if (!node) return "";
        const nodeChildren = children.get(id) || [];
        const images = (node.images || []).map(renderThumb).join("");
        return `
          <li class="tree-node">
            <article class="node-card">
              <div class="node-main">
                <div class="node-title-row">
                  <h4 class="node-title">${esc(node.title)}</h4>
                  <span class="badge ${statusClass(node.status)}">${esc(node.status)}</span>
                </div>
                <p class="node-note">${esc(node.note)}</p>
              </div>
              ${images ? `<div class="thumb-grid">${images}</div>` : ""}
            </article>
            ${nodeChildren.length ? `
              <ul>
                ${nodeChildren.map(child => `
                  <li>
                    <span class="edge-label">${esc(child.label)}</span>
                    <ul class="tree">${nodeHtml(child.to)}</ul>
                  </li>
                `).join("")}
              </ul>
            ` : ""}
          </li>
        `;
      }

      els.tree.innerHTML = project.roots.map(nodeHtml).join("");
    }

    function renderAllImages() {
      els.allImages.innerHTML = state.images.map((image, index) => `
        <button class="mini-thumb" type="button" data-image-index="${index}" aria-label="Open ${esc(image.label)}">
          <img src="${esc(image.src)}" alt="${esc(image.label)}" loading="lazy">
        </button>
      `).join("");
    }

    function renderProject(index) {
      state.projectIndex = index;
      const project = projects[index];
      state.images = flattenImages(project);
      els.title.textContent = project.title;
      els.status.textContent = project.status;
      renderPills();
      renderDocs(project);
      renderStats(project);
      renderTree(project);
      renderAllImages();
      history.replaceState(null, "", "#" + project.id);
    }

    function openLightbox(index) {
      if (index < 0 || index >= state.images.length) return;
      state.lightboxIndex = index;
      updateLightbox();
      els.lightbox.classList.add("open");
      els.close.focus();
    }

    function closeLightbox() {
      els.lightbox.classList.remove("open");
    }

    function updateLightbox() {
      const project = projects[state.projectIndex];
      const image = state.images[state.lightboxIndex];
      els.lightboxImage.src = image.src;
      els.lightboxImage.alt = image.label;
      els.lightboxProject.textContent = project.title;
      els.lightboxTitle.textContent = image.label;
      els.lightboxNote.textContent = [image.node, image.note].filter(Boolean).join(" - ");
      els.lightboxCounter.textContent = `${state.lightboxIndex + 1} / ${state.images.length}`;
    }

    function moveLightbox(delta) {
      if (!state.images.length) return;
      state.lightboxIndex = (state.lightboxIndex + delta + state.images.length) % state.images.length;
      updateLightbox();
    }

    document.addEventListener("click", event => {
      const pill = event.target.closest("[data-project-index]");
      if (pill) {
        renderProject(Number(pill.dataset.projectIndex));
        return;
      }

      const imageButton = event.target.closest("[data-image-index]");
      if (imageButton) {
        openLightbox(Number(imageButton.dataset.imageIndex));
      }
    });

    els.close.addEventListener("click", closeLightbox);
    els.prev.addEventListener("click", () => moveLightbox(-1));
    els.next.addEventListener("click", () => moveLightbox(1));
    els.lightbox.addEventListener("click", event => {
      if (event.target === els.lightbox) closeLightbox();
    });

    document.addEventListener("keydown", event => {
      if (!els.lightbox.classList.contains("open")) return;
      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowLeft") moveLightbox(-1);
      if (event.key === "ArrowRight") moveLightbox(1);
    });

    const initialId = location.hash.replace("#", "");
    const initialIndex = Math.max(0, projects.findIndex(project => project.id === initialId));
    renderProject(initialIndex);
  </script>
